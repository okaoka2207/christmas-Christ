<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教会でワイワイ楽しいクリスマス会2026</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fffaf0; /* 温かみのあるクリーム色 */
            color: #2c3e50;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .header {
            background-color: #b33939; /* クリスマスレッド */
            color: white;
            padding: 40px 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .header h2 {
            color: #f1c40f; /* キラキラゴールド */
            margin: 10px 0 0 0;
            font-size: 20px;
        }
        .content {
            padding: 30px 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .highlight {
            background-color: #218c74; /* もみの木グリーン */
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: bold;
        }
        .info-box {
            background-color: white;
            border: 2px dashed #b33939;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .info-title {
            color: #b33939;
            font-weight: bold;
            font-size: 18px;
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>みんな集まれ！<br>教会でワイワイ楽しいクリスマス会2026 🎄</h1>
        <h2>〜くまモンもやってくる！？〜</h2>
    </div>

    <div class="content">
        <p style="font-size: 18px; line-height: 1.6;">
            美味しいカレーパーティーやバザー、楽しいステージにサンタさんも登場！みんなで最高の思い出を一緒に作りましょう！
        </p>

        <div class="highlight">
            🎉 今回は駐車場もあります！<br>お車でも安心してお越しください♪
        </div>

        <div class="info-box">
            <p class="info-title">📅 いつ（日時）</p>
            <p style="font-size: 18px; margin: 0;"><b>2026年12月5日（土）</b><br>11:00 〜 15:30</p>
        </div>

        <div class="info-box">
            <p class="info-title">📍 どこで（場所）</p>
            <p style="font-size: 16px; margin: 0;">
                <b>熊本市東区（QQP4+XQ 熊本市、熊本県）</b><br>
                <span style="color: #7f8c8d; font-size: 14px;">※詳しい地図（Googleマップ）は、このあとすぐ連動させます！</span>
            </p>
        </div>
    </div>

</body>
</html>
